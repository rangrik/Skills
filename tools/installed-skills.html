<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Installed skills</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1d212b;
    --border: #2a2f3a;
    --text: #e6e9ef;
    --muted: #9aa3b2;
    --accent: #6ea8fe;
    --copied: #f0b429;
    --repo: #4ade80;
    --shared: #6ea8fe;
    --external: #c084fc;
    --broken: #f87171;
    --radius: 10px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f8; --panel: #ffffff; --panel-2: #f0f2f5; --border: #e2e5ea;
      --text: #1b1f27; --muted: #66707f;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 64px; }
  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px; margin-bottom: 4px; }
  h1 { font-size: 22px; margin: 0; letter-spacing: -0.01em; }
  .ts { color: var(--muted); font-size: 12px; }
  .hint { color: var(--muted); font-size: 12px; margin: 6px 0 24px; }
  code.kbd { background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; padding: 1px 6px; font-size: 12px; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .card .num { font-size: 26px; font-weight: 650; letter-spacing: -0.02em; }
  .card .lbl { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }
  .card.b-broken .num { color: var(--broken); }

  .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 20px; }
  .controls input[type=search] {
    flex: 1 1 240px; min-width: 200px; padding: 9px 12px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--panel); color: var(--text); font-size: 14px;
  }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    cursor: pointer; user-select: none; padding: 6px 11px; border-radius: 999px; font-size: 12px;
    border: 1px solid var(--border); background: var(--panel); color: var(--muted);
  }
  .chip.active { color: var(--text); border-color: var(--accent); background: var(--panel-2); }
  .chip .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: 1px; }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
  .tab {
    cursor: pointer; user-select: none; padding: 10px 16px; font-size: 14px; font-weight: 600;
    color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent;
    margin-bottom: -1px; display: flex; align-items: center; gap: 8px; font-family: inherit;
  }
  .tab code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; }
  .tab .tcount { font-weight: 400; font-size: 12px; color: var(--muted); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab .tdot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--broken); }

  section.store { margin-bottom: 30px; }

  table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  th, td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; background: var(--panel-2); }
  tr:last-child td { border-bottom: none; }
  td.name { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; white-space: nowrap; }
  td.target { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); font-size: 12px; word-break: break-all; }
  td.desc { color: var(--text); }
  tr.broken td.name { color: var(--broken); }

  .badge { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; white-space: nowrap; border: 1px solid transparent; }
  .badge.copied   { color: var(--copied);   border-color: var(--copied);   background: color-mix(in srgb, var(--copied) 12%, transparent); }
  .badge.repo     { color: var(--repo);     border-color: var(--repo);     background: color-mix(in srgb, var(--repo) 12%, transparent); }
  .badge.shared   { color: var(--shared);   border-color: var(--shared);   background: color-mix(in srgb, var(--shared) 12%, transparent); }
  .badge.external { color: var(--external); border-color: var(--external); background: color-mix(in srgb, var(--external) 12%, transparent); }
  .badge.broken   { color: var(--broken);   border-color: var(--broken);   background: color-mix(in srgb, var(--broken) 12%, transparent); }

  .empty { color: var(--muted); padding: 16px; border: 1px dashed var(--border); border-radius: var(--radius); }
  .error { color: var(--broken); padding: 16px; border: 1px solid var(--broken); border-radius: var(--radius); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Installed skills</h1>
    <span class="ts" id="ts"></span>
  </header>
  <p class="hint">Generated by <code class="kbd">./tools/report-skills.sh</code>. Re-run it to refresh, then reload this page.</p>

  <div class="cards" id="cards"></div>

  <div class="controls">
    <input type="search" id="search" placeholder="Filter by name, description, or target…" autocomplete="off" />
    <div class="chips" id="chips"></div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="stores"></div>
</div>

<script src="../generated/installed-skills.js" onerror="window.__shimMissing=true"></script>
<script>
const TYPES = {
  copied:   { label: "copied folder",   color: "var(--copied)" },
  repo:     { label: "→ this repo",  color: "var(--repo)" },
  shared:   { label: "→ shared store", color: "var(--shared)" },
  external: { label: "→ external",   color: "var(--external)" },
  broken:   { label: "broken link",      color: "var(--broken)" },
};
const TYPE_ORDER = ["copied", "repo", "shared", "external", "broken"];

const state = { data: null, query: "", active: new Set(TYPE_ORDER), store: 0 };

async function loadData() {
  if (window.INSTALLED_SKILLS) return window.INSTALLED_SKILLS;
  // Served over http(s): fetch the JSON directly.
  const res = await fetch("../generated/installed-skills.json", { cache: "no-store" });
  if (!res.ok) throw new Error("HTTP " + res.status);
  return res.json();
}

function el(tag, props = {}, ...kids) {
  const n = document.createElement(tag);
  Object.assign(n, props);
  for (const k of kids) n.append(k.nodeType ? k : document.createTextNode(k));
  return n;
}

function renderCards(summary) {
  const cards = document.getElementById("cards");
  cards.innerHTML = "";
  const items = [
    ["total", "Total"], ["copied", "Copied"], ["repo", "→ Repo"],
    ["shared", "→ Shared"], ["external", "→ External"], ["broken", "Broken"],
  ];
  for (const [key, lbl] of items) {
    const c = el("div", { className: "card" + (key === "broken" ? " b-broken" : "") });
    c.append(el("div", { className: "num", textContent: String(summary[key] ?? 0) }));
    c.append(el("div", { className: "lbl", textContent: lbl }));
    cards.append(c);
  }
}

function renderChips() {
  const chips = document.getElementById("chips");
  chips.innerHTML = "";
  for (const t of TYPE_ORDER) {
    const active = state.active.has(t);
    const chip = el("span", { className: "chip" + (active ? " active" : "") });
    const dot = el("span", { className: "dot" });
    dot.style.background = TYPES[t].color;
    chip.append(dot, document.createTextNode(TYPES[t].label));
    chip.onclick = () => {
      if (state.active.has(t)) state.active.delete(t); else state.active.add(t);
      if (state.active.size === 0) TYPE_ORDER.forEach((x) => state.active.add(x));
      renderChips();
      renderStores();
    };
    chips.append(chip);
  }
}

function matches(skill) {
  if (!state.active.has(skill.type)) return false;
  const q = state.query.trim().toLowerCase();
  if (!q) return true;
  return (skill.name + " " + (skill.description || "") + " " + (skill.target || ""))
    .toLowerCase().includes(q);
}

function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";
  state.data.stores.forEach((store, i) => {
    const visible = (store.skills || []).filter(matches);
    const tab = el("button", { className: "tab" + (i === state.store ? " active" : "") });
    tab.append(el("code", { textContent: store.path }));
    tab.append(el("span", {
      className: "tcount",
      textContent: store.present ? `${visible.length}/${store.count}` : "—",
    }));
    if (store.present && (store.skills || []).some((s) => s.type === "broken")) {
      tab.append(el("span", { className: "tdot", title: "has broken links" }));
    }
    tab.onclick = () => { state.store = i; renderTabs(); renderStores(); };
    tabs.append(tab);
  });
}

function renderStores() {
  const root = document.getElementById("stores");
  root.innerHTML = "";
  renderTabs();

  const store = state.data.stores[state.store];
  if (!store) return;
  const section = el("section", { className: "store" });
  const visible = (store.skills || []).filter(matches);

  if (!store.present) {
    section.append(el("div", { className: "empty", textContent: "This store does not exist on disk." }));
  } else if (visible.length === 0) {
    section.append(el("div", { className: "empty", textContent: "No skills match the current filters." }));
  } else {
    const table = el("table");
    table.append(el("tr", {},
      el("th", { textContent: "Skill" }),
      el("th", { textContent: "Type" }),
      el("th", { textContent: "Target" }),
      el("th", { textContent: "Description" }),
    ));
    for (const s of visible) {
      const tr = el("tr", { className: s.type === "broken" ? "broken" : "" });
      tr.append(el("td", { className: "name", textContent: s.name }));
      const badge = el("span", { className: "badge " + s.type, textContent: (TYPES[s.type] || {}).label || s.type });
      tr.append(el("td", {}, badge));
      tr.append(el("td", { className: "target", textContent: s.target || "—" }));
      tr.append(el("td", { className: "desc", textContent: s.description || "" }));
      table.append(tr);
    }
    section.append(table);
  }
  root.append(section);
}

function render() {
  document.getElementById("ts").textContent = "generated " + (state.data.generatedAt || "");
  renderCards(state.data.summary || {});
  renderChips();
  renderStores();
}

document.getElementById("search").addEventListener("input", (e) => {
  state.query = e.target.value;
  renderStores();
});

loadData()
  .then((data) => { state.data = data; render(); })
  .catch((err) => {
    document.getElementById("stores").innerHTML =
      '<div class="error">Could not load skill data: ' + String(err) +
      '. Run <code>./tools/report-skills.sh</code> to generate <code>generated/installed-skills.js</code> / <code>generated/installed-skills.json</code>.</div>';
  });
</script>
</body>
</html>
